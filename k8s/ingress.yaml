apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: gym-api
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
    - hosts:
        - api.gymplatform.io
      secretName: gym-api-tls
  rules:
    - host: api.gymplatform.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: gym-api
                port:
                  number: 80

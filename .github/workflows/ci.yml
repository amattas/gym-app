name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # ---------------------------------------------------------------------------
  # Detect which paths changed so jobs only run when relevant
  # ---------------------------------------------------------------------------
  changes:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      web: ${{ steps.filter.outputs.web }}
      android: ${{ steps.filter.outputs.android }}
      ios: ${{ steps.filter.outputs.ios }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
            web:
              - 'web/**'
            android:
              - 'android/**'
            ios:
              - 'ios/**'

  # ---------------------------------------------------------------------------
  # Python — backend (FastAPI)
  # ---------------------------------------------------------------------------
  backend-lint:
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ".[dev]"
          pip install bandit pip-audit

      - name: Lint (ruff)
        run: ruff check src/ tests/

      - name: Security scan (bandit)
        run: bandit -r src/ -q

      - name: Dependency audit
        run: pip-audit || true

  backend-test:
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: gym
          POSTGRES_PASSWORD: gym
          POSTGRES_DB: gym_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U gym"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ".[dev]"

      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://gym:gym@localhost:5432/gym_test
        run: python -m pytest tests/ -v --tb=short

  backend-docker:
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t gym-api:ci ./backend

      - name: Scan with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: gym-api:ci
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH

  # ---------------------------------------------------------------------------
  # TypeScript/JS — web (Next.js)
  # ---------------------------------------------------------------------------
  web-lint:
    needs: changes
    if: needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint (eslint)
        run: npx eslint .

      - name: Check formatting (prettier)
        run: npx prettier --check .

      - name: Type check (tsc)
        run: npx tsc --noEmit

  web-test:
    needs: changes
    if: needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npx jest --ci --coverage

  # ---------------------------------------------------------------------------
  # Kotlin — android
  # ---------------------------------------------------------------------------
  android-lint:
    needs: changes
    if: needs.changes.outputs.android == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - uses: gradle/actions/setup-gradle@v4

      - name: Lint (ktlint)
        run: ./gradlew ktlintCheck

      - name: Android lint
        run: ./gradlew lint

  android-test:
    needs: changes
    if: needs.changes.outputs.android == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - uses: gradle/actions/setup-gradle@v4

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest

  # ---------------------------------------------------------------------------
  # Swift — ios
  # ---------------------------------------------------------------------------
  ios-lint:
    needs: changes
    if: needs.changes.outputs.ios == 'true'
    runs-on: macos-latest
    defaults:
      run:
        working-directory: ios
    steps:
      - uses: actions/checkout@v4

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Lint (swiftlint)
        run: swiftlint lint --strict

  ios-test:
    needs: changes
    if: needs.changes.outputs.ios == 'true'
    runs-on: macos-latest
    defaults:
      run:
        working-directory: ios
    steps:
      - uses: actions/checkout@v4

      - name: Run tests
        run: |
          xcodebuild test \
            -scheme GymApp \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            -resultBundlePath TestResults \
            CODE_SIGNING_ALLOWED=NO
